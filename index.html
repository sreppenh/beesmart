    function saveToStorage(k, v) { try { localStorage.setItem("beesmart_" + k, JSON.stringify(v)); } catch { } }
    function loadFromStorage(k) { try { const v = localStorage.getItem("beesmart_" + k); return v ? JSON.parse(v) : null; } catch { return null; } }

      const cs = loadFromStorage("category_stats");
      if (cs) state.categoryStats = cs;
      const ds = loadFromStorage("dailystreak");
      if (ds) {
        const today = new Date().toDateString();
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        if (ds.lastDate === today || ds.lastDate === yesterday) state.dailyStreak = ds.streak;

      const theme = loadFromStorage("theme");
      if (theme) { state.theme = theme; document.body.classList.toggle("day", theme === "day"); }

        else if (ds.lastDate === yesterday) s = ds.streak + 1;

      state.dailyStreak = s;
      saveToStorage("dailystreak", { streak: s, lastDate: today });

      state.screen = "game"; state.currentWord = null; state.feedback = null;

    function diffLabel(d) {
      if (d < 2) return "Warm-up";
      if (d < 4) return "Beginner";
      if (d < 6) return "Medium";
      if (d < 8) return "Hard";
      if (d < 9.5) return "Expert";
      return "Master";
    }

    function scrambleWord(word) {
      const arr = word.split("");
      for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[arr[i], arr[j]] = [arr[j], arr[i]]; }
      const r = arr.join(""); return r === word && word.length > 1 ? scrambleWord(word) : r;
    }

    // Build letter gap: hide more letters at higher difficulty
    function buildGap(word) {
      const len = word.length;
      const d = state.difficulty;
      // At difficulty 1: ~30% hidden, at 10: ~80% hidden
      const hideFraction = 0.3 + (d / 10) * 0.5;
      const numHidden = Math.max(1, Math.round(len * hideFraction));
      const indices = Array.from({ length: len }, (_, i) => i);
      // At difficulty >= 8, first letter is also eligible to be hidden
      const pool = state.difficulty >= 8 ? indices : indices.slice(1);
      const shuffled = pool.slice().sort(() => Math.random() - 0.5);
      const hidden = new Set(shuffled.slice(0, Math.min(numHidden, pool.length)));
      return Array.from({ length: len }, (_, i) => hidden.has(i));
    }

    function speak(text) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.85; u.pitch = 1;
      window.speechSynthesis.speak(u);

        tier = "tier-3"; duration = 1800;
      } else if (streak >= 5) {
        emojis = ["🐝", "⭐", "🐝", "✨", "🐝"];
        tier = "tier-2"; duration = 1300;
      } else {
        emojis = ["🐝", "✨"];
        tier = "tier-1"; duration = 900;
      }
      el.innerHTML = emojis.map((e, i) =>
        `<span class="celeb-emoji" style="font-size:${tier === 'tier-3' ? 52 : tier === 'tier-2' ? 44 : 36}px;animation-delay:${i * 0.05}s">${e}</span>`
      ).join("");
      el.className = `show ${tier}`;
      setTimeout(() => { el.className = ""; el.innerHTML = ""; }, duration);
    }

    function shouldShowMultipleChoice() {
      if (!isQuizMode()) return false;
      const d = state.warmupRamp
        ? Math.min(state.difficulty, getDifficultyTier(state.difficulty) <= 1 ? 3 : state.difficulty)
        : state.difficulty;
      if (d < 2) return Math.random() < 0.85;
      if (d < 4) return Math.random() < 0.65;
      if (d < 6) return Math.random() < 0.40;
      if (d < 8) return Math.random() < 0.20;
      return false;
    }

    function generateMCOptions() {
      const word = state.currentWord;
      if (!word) return [];
      const correctAnswer = word.word;
      const catId = word.catId || state.selectedCategory;
      const isMobile = window.innerWidth < 600;
      const numOptions = isMobile ? 3 : 4;
      const numDistractors = numOptions - 1;
      const currentTier = getDifficultyTier(state.difficulty);

      function pickRandom(arr, n, exclude) {
        const pool = arr.filter(x => !exclude.has(x)).sort(() => Math.random() - 0.5);
        return pool.slice(0, n);
      }

      let distractors = [];

      if (catId === 'countries' || catId === 'states') {
        const dataset = catId === 'countries' ? COUNTRIES_CAPITALS : STATES_CAPITALS;
        const entry = word.entry;
        const isCapitalAnswer = entry && word.word === entry.capital;
        const region = entry && entry.region;
        // Countries use .country field, states use .state field
        const idField = catId === 'countries' ? 'country' : 'state';
        const correctId = entry && entry[idField];

        const getAnswer = (e) => isCapitalAnswer ? e.capital : e[idField];
        const notCorrect = (e) => e[idField] !== correctId;

        // Prefer same-region distractors
        const sameRegion = region
          ? dataset.filter(e => e.region === region && notCorrect(e))
          : [];
        const higherTier = currentTier < 3
          ? dataset.filter(e => e.difficulty > currentTier && notCorrect(e))
          : [];
        const anyOther = dataset.filter(notCorrect);

        const used = new Set([correctAnswer]);

        // 1 higher-tier distractor
        if (higherTier.length > 0 && numDistractors > 1) {
          const picks = pickRandom(higherTier.map(getAnswer), 1, used);
          picks.forEach(p => { distractors.push(p); used.add(p); });
        }
        // Fill from same region
        const regionAnswers = sameRegion.map(getAnswer).filter(a => a && !used.has(a));
        const regionPicks = regionAnswers.sort(() => Math.random() - 0.5).slice(0, numDistractors - distractors.length);
        regionPicks.forEach(p => { distractors.push(p); used.add(p); });
        // Fill remainder from any
        if (distractors.length < numDistractors) {
          const anyAnswers = anyOther.map(getAnswer).filter(a => a && !used.has(a));
          const anyPicks = anyAnswers.sort(() => Math.random() - 0.5).slice(0, numDistractors - distractors.length);
          anyPicks.forEach(p => { distractors.push(p); used.add(p); });
        }

      } else if (catId === 'elements') {
        const entry = word.entry;
        const isNameAnswer = word.isElementName;
        const group = entry && entry.group;
        const number = entry && entry.number;

        // For symbol answer: pick symbols from nearby atomic numbers or same group
        // For name answer: pick names from same group or nearby numbers
        const getAnswer = (e) => isNameAnswer ? e.name : e.symbol;
        const used = new Set([correctAnswer]);

        const sameGroup = group ? ELEMENTS.filter(e => e.group === group && e.name !== entry.name) : [];
        const nearbyNum = number ? ELEMENTS.filter(e => Math.abs(e.number - number) <= 10 && e.name !== entry.name) : [];
        const higherTier = currentTier < 3
          ? ELEMENTS.filter(e => e.difficulty > currentTier && e.name !== entry.name)
          : [];

        // If symbol answer, prefer visually/numerically similar symbols
        if (!isNameAnswer) {
          // Nearby elements (similar atomic numbers) = similar symbols often
          const nearby = nearbyNum.map(getAnswer).filter(a => !used.has(a));
          const nearbyPicks = nearby.sort(() => Math.random() - 0.5).slice(0, numDistractors - 1);
          nearbyPicks.forEach(p => { distractors.push(p); used.add(p); });
        } else {
          const groupAnswers = sameGroup.map(getAnswer).filter(a => !used.has(a));
          const groupPicks = groupAnswers.sort(() => Math.random() - 0.5).slice(0, numDistractors - 1);
          groupPicks.forEach(p => { distractors.push(p); used.add(p); });
        }

        // 1 higher-tier distractor
        if (higherTier.length > 0 && distractors.length < numDistractors) {
          const picks = higherTier.map(getAnswer).filter(a => !used.has(a)).sort(() => Math.random() - 0.5).slice(0, 1);
          picks.forEach(p => { distractors.push(p); used.add(p); });
        }
        // Fill remainder from any element
        if (distractors.length < numDistractors) {
          const any = ELEMENTS.filter(e => e.name !== entry.name).map(getAnswer).filter(a => !used.has(a));
          const anyPicks = any.sort(() => Math.random() - 0.5).slice(0, numDistractors - distractors.length);
          anyPicks.forEach(p => { distractors.push(p); used.add(p); });
        }

      } else if (catId === 'flags') {
        const entry = word.entry;
        const region = entry && entry.region;
        const used = new Set([correctAnswer]);

        const sameRegion = region ? FLAGS.filter(f => f.region === region && f.country !== entry.country) : [];
        const higherTier = currentTier < 3
          ? FLAGS.filter(f => f.difficulty > currentTier && f.country !== entry.country)
          : [];
        const anyOther = FLAGS.filter(f => f.country !== entry.country);

        // 1 higher-tier distractor
        if (higherTier.length > 0 && numDistractors > 1) {
          const picks = higherTier.filter(f => !used.has(f.country)).sort(() => Math.random() - 0.5).slice(0, 1);
          picks.forEach(f => { distractors.push(f.country); used.add(f.country); });
        }
        // Same region
        const regionPicks = sameRegion.filter(f => !used.has(f.country)).sort(() => Math.random() - 0.5).slice(0, numDistractors - distractors.length);
        regionPicks.forEach(f => { distractors.push(f.country); used.add(f.country); });
        // Any remainder
        if (distractors.length < numDistractors) {
          const anyPicks = anyOther.filter(f => !used.has(f.country)).sort(() => Math.random() - 0.5).slice(0, numDistractors - distractors.length);
          anyPicks.forEach(f => { distractors.push(f.country); used.add(f.country); });
        }
      }

      // Assemble and shuffle
      const options = [correctAnswer, ...distractors.slice(0, numDistractors)];
      for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [options[i], options[j]] = [options[j], options[i]];
      }
      return options.map(o => ({ answer: o, isCorrect: o === correctAnswer }));
    }

    function handleMCAnswer(answer) {
      if (!state.currentWord || state.transitioning || state.mcAnswered) return;
      state.mcAnswered = true;
      state.lastAttempt = answer;
      const isCorrect = answer === state.currentWord.word;
      const key = getStatsKey();
      const cs = getCatStats(key);
      setCatStats(key, { mcAttempted: (cs.mcAttempted || 0) + 1, mcCorrect: (cs.mcCorrect || 0) + (isCorrect ? 1 : 0) });

      // Re-render to show button color feedback, then process result
      render();
      if (isCorrect) {
        setTimeout(() => handleCorrect(), 300);
      } else {
        setTimeout(() => handleWrong(`It was "${state.currentWord.word}"`), 400);
      }
    }

    function getElementChallenge() {
      const rawTier = getEffectiveTier();
      const tier = rawTier === 0 ? 1 : rawTier; // elements have no tier 0; fall back to tier 1
      const usedSet = new Set(state.usedWords);
      const candidates = ELEMENTS.filter(e => e.difficulty === tier && !usedSet.has(e.name));
      const pool = candidates.length > 0 ? candidates : ELEMENTS.filter(e => !usedSet.has(e.name));
      if (pool.length === 0) return null;
      const entry = pool[Math.floor(Math.random() * pool.length)];
      const useScramble = state.difficulty >= 6 && Math.random() < 0.4;
      const showSymbolTypeName = Math.random() < 0.5;
      if (useScramble) {
        return {
          word: entry.name, definition: "Symbol: " + entry.symbol + "  •  Atomic #" + entry.number,
          sentence: "Unscramble to find the element with symbol " + entry.symbol + ": ______",
          category: "Elements & Symbols", catId: "elements", mechanic: "scramble", misspelled: "", wrongIndex: -1, entry
        };
      } else if (showSymbolTypeName) {
        return {
          word: entry.name, definition: "Symbol: " + entry.symbol + "  •  Atomic #" + entry.number,
          sentence: "The element with symbol " + entry.symbol + " is ______.",
          category: "Elements & Symbols", catId: "elements", misspelled: "", wrongIndex: -1, entry, isElementName: true
        };
      } else {
        return {
          word: entry.symbol, definition: "Element: " + entry.name + "  •  Atomic #" + entry.number,
          sentence: "The chemical symbol for " + entry.name + " is ______.",
          category: "Elements & Symbols", catId: "elements", misspelled: "", wrongIndex: -1, entry, isElementName: false
        };
      }
    }

    function getFlagChallenge() {
      const rawTier = getEffectiveTier();
      const tier = rawTier === 0 ? 1 : rawTier; // flags have no tier 0; fall back to tier 1
      const usedSet = new Set(state.usedWords);
      const candidates = FLAGS.filter(f => f.difficulty === tier && !usedSet.has(f.country));
      const pool = candidates.length > 0 ? candidates : FLAGS.filter(f => !usedSet.has(f.country));
      if (pool.length === 0) return null;
      const entry = pool[Math.floor(Math.random() * pool.length)];
      return {
        word: entry.country, definition: entry.flag,
        sentence: "The country with this flag " + entry.flag + " is ______.",
        category: "Flag to Country", catId: "flags", isFlag: true, misspelled: "", wrongIndex: -1, entry
      };
    }

    // ─── CAPITALS MODE LOGIC ────────────────────────────────────────────────────

    function isCapitalsMode() {
      return state.selectedCategory === "countries" || state.selectedCategory === "states";
    }

    function getCapitalsDataset() {
      return state.selectedCategory === "countries" ? COUNTRIES_CAPITALS : STATES_CAPITALS;
    }

    // In easy mode (difficulty < 5): just spell the shown word
    // In hard mode (difficulty >= 5): see one, spell the other
    function getCapitalsChallenge() {
      const dataset = getCapitalsDataset();
      const tier = getEffectiveTier();
      const usedSet = new Set(state.usedWords);
      const isStates = state.selectedCategory === "states";
      // Countries use .country field, states use .state field
      const nameField = isStates ? "state" : "country";
      const nameLabel = isStates ? "state" : "country";

      const candidates = dataset.filter(d =>
        d.difficulty === tier && !usedSet.has(d[nameField]) && !usedSet.has(d.capital)
      );
      const pool = candidates.length > 0 ? candidates :
        dataset.filter(d => !usedSet.has(d[nameField]) && !usedSet.has(d.capital));

      if (pool.length === 0) return null;
      const entry = pool[Math.floor(Math.random() * pool.length)];
      const entryName = entry[nameField]; // the country or state name

      const isHardMode = state.difficulty >= 5;

      if (!isHardMode) {
        // Easy: just spell the country/state or capital (random pick)
        const spellCapital = Math.random() < 0.5;
        const wordToSpell = spellCapital ? entry.capital : entryName;
        const context = spellCapital
          ? `The capital of ${entryName}`
          : `The ${nameLabel} whose capital is ${entry.capital}`;
        return {
          word: wordToSpell,
          definition: context,
          sentence: `${context} is ______.`,
          category: state.selectedCategory === "countries" ? "Countries & Capitals" : "States & Capitals",
          catId: state.selectedCategory,
          isCapitals: true,
          entry
        };
      } else {
        // Hard: see the country/state, spell the capital (or vice versa, alternating)
        const spellCapital = Math.random() < 0.5;
        const prompt = spellCapital ? entryName : entry.capital;
        const answer = spellCapital ? entry.capital : entryName;
        const clue = spellCapital
          ? `What is the capital of ${prompt}?`
          : `Which ${nameLabel} has ${prompt} as its capital?`;
        return {
          word: answer,
          definition: clue,
          sentence: `${clue} → ______`,
          category: state.selectedCategory === "countries" ? "Countries & Capitals" : "States & Capitals",
          catId: state.selectedCategory,
          isCapitals: true,
          entry
        };
      }
    }

    // --- WORD SELECTION: Library first, AI fallback ---

    function getDifficultyTier(d) {
      if (d < 2) return 0;
      if (d < 4) return 1;
      if (d < 7) return 2;
      return 3;
    }

    // Returns the effective tier for word selection, applying warm-up ramp for returning players
    function getEffectiveTier() {
      if (state.warmupRamp) {
        if (state.sessionWordCount < 2) return 0;
        if (state.sessionWordCount < 4) return Math.max(0, getDifficultyTier(state.difficulty) - 1);
      }
      return getDifficultyTier(state.difficulty);
    }

    function addMisspellingIfNeeded(wordObj, needsMisspelling) {
      if (!needsMisspelling) return { ...wordObj, misspelled: "", wrongIndex: -1 };
      const word = wordObj.word;
      const commonSubs = {
        a: ["e", "o"], e: ["a", "i"], i: ["e", "y"], o: ["u", "a"], u: ["o", "e"],
        c: ["k", "s"], k: ["c"], s: ["z"], n: ["m"], m: ["n"], l: ["r"], r: ["l"],
        t: ["d"], d: ["t"], p: ["b"], b: ["p"], g: ["j"], f: ["v"]
      };
      const positions = Array.from({ length: word.length - 1 }, (_, i) => i + 1).sort(() => Math.random() - 0.5);
      for (const idx of positions) {
        const letter = word[idx].toLowerCase();
        const subs = commonSubs[letter];
        if (subs) {
          const sub = subs[Math.floor(Math.random() * subs.length)];
          const misspelled = word.slice(0, idx) + sub + word.slice(idx + 1);
          if (misspelled.length === word.length && misspelled.toLowerCase() !== word.toLowerCase()) {
            return { ...wordObj, misspelled, wrongIndex: idx };
          }
        }
      }
      // Fallback: swap two adjacent middle letters
      const mid = Math.floor(word.length / 2);
      if (mid + 1 < word.length) {
        const misspelled = word.slice(0, mid) + word[mid + 1] + word[mid] + word.slice(mid + 2);
        return { ...wordObj, misspelled, wrongIndex: mid };
      }
      return { ...wordObj, misspelled: word, wrongIndex: -1 };
    }

    function getLibraryWord(catId, needsMisspelling) {
      const tier = getEffectiveTier();
      const usedSet = new Set(state.usedWords);

      let srQueue = [];
      try { srQueue = JSON.parse(localStorage.getItem("beesmart_sr_queue") || "[]"); } catch { }

      // Check for spaced repetition words due
      const srDue = srQueue.find(item =>
        (catId === "surprise" || item.catId === catId) &&
        item.dueAfter <= state.usedWords.length &&
        !usedSet.has(item.word)
      );
      if (srDue) {
        const libWord = ALL_WORDS.find(w => w.word === srDue.word);
        if (libWord) return addMisspellingIfNeeded(libWord, needsMisspelling);
      }

      // Pick fresh word from library
      const candidates = ALL_WORDS.filter(w =>
        (catId === "surprise" || w.catId === catId) &&
        w.difficulty === tier &&
        !usedSet.has(w.word)
      );

      if (candidates.length === 0) {
        const fallback = ALL_WORDS.filter(w =>
          (catId === "surprise" || w.catId === catId) && !usedSet.has(w.word)
        );
        if (fallback.length === 0) return null;
        // During ramp, prefer lower-difficulty words in fallback
        const sorted = fallback.slice().sort((a, b) => a.difficulty - b.difficulty);
        const pool = tier <= 1 ? sorted.slice(0, Math.max(5, Math.ceil(sorted.length * 0.4))) : sorted;
        const pick = pool[Math.floor(Math.random() * pool.length)];
        return addMisspellingIfNeeded(pick, needsMisspelling);
      }

      const pick = candidates[Math.floor(Math.random() * candidates.length)];
      return addMisspellingIfNeeded(pick, needsMisspelling);
    }

    function updateSpacedRepetition(word, catId, correct) {
      let srQueue = [];
      try { srQueue = JSON.parse(localStorage.getItem("beesmart_sr_queue") || "[]"); } catch { }
      const existing = srQueue.findIndex(i => i.word === word && i.catId === catId);
      if (correct) {
        if (existing >= 0) {
          srQueue[existing].correctCount = (srQueue[existing].correctCount || 0) + 1;
          if (srQueue[existing].correctCount >= 3) srQueue.splice(existing, 1);
        }
      } else {
        if (existing >= 0) {
          srQueue[existing].dueAfter = state.usedWords.length + 3;
          srQueue[existing].correctCount = 0;
        } else {
          srQueue.push({ word, catId, dueAfter: state.usedWords.length + 3, correctCount: 0 });
        }
      }
      try { localStorage.setItem("beesmart_sr_queue", JSON.stringify(srQueue)); } catch { }
    }

    async function fetchWordFromAI(catId, needsMisspelling) {
      const cat = CATEGORIES.find(c => c.id === catId) || CATEGORIES[5];
      const dl = state.difficulty < 3 ? "easy" : state.difficulty < 6 ? "medium" : "hard";
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user", content:
              `Generate a spelling challenge word for an adult spelling bee game.\n\nCategory: ${cat.name} — focus on: ${cat.prompt}\nDifficulty: ${dl} (${state.difficulty.toFixed(1)}/10)\nDo NOT use: ${state.usedWords.slice(-20).join(", ") || "none"}\n\nIMPORTANT: In the sentence field replace the word with "______".\n${needsMisspelling ? 'Provide a misspelled version with EXACTLY ONE letter substituted (same word length, no additions or deletions). Include misspelled and wrongIndex (0-based).' : ''}\n\nRespond ONLY raw JSON:\n{"word":"the word","definition":"max 15 words","sentence":"with ______","category":"subcategory","misspelled":"","wrongIndex":-1}`
          }]
        })
      });
      const data = await res.json();
      const parsed = JSON.parse(data.content[0].text.trim().replace(/\`\`\`json|\`\`\`/g, ""));
      if (needsMisspelling && parsed.misspelled && parsed.misspelled.length !== parsed.word.length) {
        return addMisspellingIfNeeded({ ...parsed, catId }, true);
      }
      return { ...parsed, catId };
    }

    async function fetchWord(needsMisspelling) {
      const catId = state.selectedCategory || "general";
      if (isCapitalsMode()) {
        const challenge = getCapitalsChallenge();
        if (challenge) return challenge;
      }
      if (catId === "elements") {
        const challenge = getElementChallenge();
        if (challenge) return challenge;
      }
      if (catId === "flags") {
        const challenge = getFlagChallenge();
        if (challenge) return challenge;
      }
      const libWord = getLibraryWord(catId, needsMisspelling);
      if (libWord) return libWord;
      return await fetchWordFromAI(catId, needsMisspelling);
    }

    async function loadNextWord() {
      if (state.blitz && state.blitzExpired) { endBlitzGame(); return; }
      state.loading = true; state.hint = null; state.hintUsed = false;
      state.attempts = 0; state.feedback = null; state.transitioning = false;
      state.selectedOloIndex = -1; state.oloPhase = "select"; state.lastAttempt = null;
      state.isMultipleChoice = false; state.multipleChoiceOptions = []; state.mcAnswered = false;
      render();
      try {
        const isCapitals = isCapitalsMode();
        const isQuiz = isQuizMode();
        let next;
        if (isCapitals || state.selectedCategory === "flags") {
          next = "definition";
        } else if (state.selectedCategory === "elements") {
          next = "definition";
        } else {
          const pool = state.blitz ? BLITZ_MECHANICS : MECHANICS;
          next = pool[Math.floor(Math.random() * pool.length)];
        }
        const wordData = await fetchWord(!isQuiz && next === "oneletteroff");
        if (wordData.mechanic) next = wordData.mechanic;
        state.mechanic = next;
        state.currentWord = wordData;
        state.usedWords.push(wordData.word);
        state.sessionWordCount += 1;

        // Determine multiple choice (quiz mode only, not scramble mechanic)
        if (isQuizMode() && next !== "scramble" && shouldShowMultipleChoice()) {
          state.isMultipleChoice = true;
          state.multipleChoiceOptions = generateMCOptions();
          state.mechanic = "definition"; // MC always shows definition-style clue
        }

        if (next === "scramble") {
          state.scrambled = scrambleWord(wordData.word.toUpperCase());
          state.scrambleRemaining = state.scrambled.split("").map((l, id) => ({ l, id }));
          state.scrambleSelected = [];
        }
        if (next === "lettergap") {
          const hidden = buildGap(wordData.word);
          state.gapIndices = hidden;
          state.gapAnswers = wordData.word.split("").map((l, i) => hidden[i] ? "" : l);
        }
        if (next === "oneletteroff") {
          state.misspelled = wordData.misspelled || wordData.word;
          state.wrongIndex = wordData.wrongIndex !== undefined ? wordData.wrongIndex : -1;
        }

        state.loading = false; render();
        requestAnimationFrame(() => requestAnimationFrame(() => {
          const card = document.querySelector(".word-card");
          if (card) { card.classList.add("word-card-enter"); }
        }));
        if (next === "audio") setTimeout(() => speak(wordData.word), 400);
        setTimeout(() => {
          const i = document.getElementById("word-input");
          if (i) i.focus();
          const g = document.querySelector(".gap-input");
          if (g) g.focus();
        }, 150);
      } catch (e) {
        state.loading = false;
        state.feedback = { type: "wrong", msg: "Connection issue — please retry" };
        render();
      }
    }

    // Handle correct answer scoring and progression
    function handleCorrect() {
      if (state.currentWord) updateSpacedRepetition(state.currentWord.word, state.currentWord.catId || state.selectedCategory, true);
      state.streak += 1;
      const prevDiff = state.difficulty;
      const diffIncrease = state.isMultipleChoice ? 0.1 : (state.hintUsed ? 0.2 : 0.4);
      state.difficulty = Math.min(10, state.difficulty + diffIncrease);
      if ([3, 5, 8].includes(state.streak)) showCelebration(state.streak);

      if (state.blitz) {
        state.blitzWordsCorrect++;
        const streakBonus = state.streak > 0 && state.streak % 3 === 0;
        const timeBonus = streakBonus ? 10 : 5;
        state.blitzTimeRemaining += timeBonus;
        const bs = getCatStats("blitz");
        setCatStats("blitz", {
          wordsAttempted: bs.wordsAttempted + 1,
          wordsCorrectFirstTry: bs.wordsCorrectFirstTry + (state.attempts === 0 ? 1 : 0),
        });
        state.feedback = { type: "correct", msg: `✓ +${timeBonus}s${streakBonus ? " 🔥" : ""}` };
        state.transitioning = true;
        saveProgress();
        render();
        setTimeout(() => { if (state.blitzExpired) { endBlitzGame(); return; } loadNextWord(); }, 1000);
      } else {
        const pts = state.isMultipleChoice ? 1 : (state.hintUsed ? 1 : state.attempts === 0 ? 3 : 2);
        state.score += pts;
        const key = getStatsKey();
        const cs = getCatStats(key);
        setCatStats(key, {
          difficulty: state.difficulty,
          wordsAttempted: cs.wordsAttempted + 1,
          wordsCorrectFirstTry: cs.wordsCorrectFirstTry + (state.attempts === 0 ? 1 : 0),
        });
        if (Math.floor(state.difficulty) > Math.floor(prevDiff)) {
          setTimeout(() => showToast(`🐝 Level Up! ${diffLabel(state.difficulty)}`), 700);
        }
        state.feedback = { type: "correct", msg: state.streak >= 3 ? `🔥 ${state.streak} in a row! +${pts}pts` : `✓ Correct!${pts > 0 ? ` +${pts} pts` : ""}` };
        state.transitioning = true;
        saveProgress();
        saveSession();
        render();
        setTimeout(() => loadNextWord(), 1400);
      }
    }

    function handleWrong(revealMsg) {
      if (state.currentWord) updateSpacedRepetition(state.currentWord.word, state.currentWord.catId || state.selectedCategory, false);
      state.streak = 0;
      state.difficulty = Math.max(1, state.difficulty - 0.3);
      state.transitioning = true;

      if (state.blitz) {
        state.blitzTimeRemaining = Math.max(0, state.blitzTimeRemaining - 5);
        const bs = getCatStats("blitz");
        setCatStats("blitz", { wordsAttempted: bs.wordsAttempted + 1 });
        state.feedback = { type: "wrong", msg: revealMsg };
        render();
        setTimeout(() => {
          if (state.blitzExpired || state.blitzTimeRemaining <= 0) { endBlitzGame(); return; }
          loadNextWord();
        }, 1400);
      } else {
        state.lives -= 1;
        const key = getStatsKey();
        const cs = getCatStats(key);
        setCatStats(key, { difficulty: state.difficulty, wordsAttempted: cs.wordsAttempted + 1 });
        if (state.lives <= 0) {
          saveProgress();
          clearSession();
          const finalCs = getCatStats(key);
          if (state.score > finalCs.bestScore) setCatStats(key, { bestScore: state.score });
          state.feedback = { type: "wrong", msg: revealMsg };
          render(); setTimeout(() => { state.screen = "gameover"; render(); }, 2000);
        } else {
          saveSession();
          state.feedback = { type: "wrong", msg: revealMsg };
          render(); setTimeout(() => loadNextWord(), 1800);
        }
      }
    }

    function handleMissedAttempt() {
      state.attempts += 1;
      if (!state.hint) state.hint = { definition: state.currentWord.definition, sentence: state.currentWord.sentence };
      if (state.attempts >= 2) {
        handleWrong(`It was "${state.currentWord.word}"`);
      } else {
        state.feedback = { type: "try", msg: "Not quite — try again!" };
        const row = document.querySelector(".input-row, .gap-input-row");
        if (row) { row.classList.add("shake"); setTimeout(() => row.classList.remove("shake"), 300); }
        render();
      }
    }

    // Standard submit (audio, definition, scramble)
    function handleSubmit() {
      if (!state.currentWord || state.transitioning) return;
      const inp = document.getElementById("word-input");
      if (!inp || !inp.value.trim()) return;
      const typed = inp.value.trim();
      const correct = typed.toLowerCase() === state.currentWord.word.toLowerCase();
      inp.value = "";
      if (correct) { handleCorrect(); }
      else { state.lastAttempt = typed; handleMissedAttempt(); }
    }

    // Letter gap submit
    function handleGapSubmit() {
      if (!state.currentWord || state.transitioning) return;
      const word = state.currentWord.word.toUpperCase();
      const inputs = document.querySelectorAll(".gap-input");
      let allCorrect = true;
      let inputIdx = 0;
      const typedLetters = word.split("");
      for (let i = 0; i < word.length; i++) {
        if (state.gapIndices[i]) {
          const val = inputs[inputIdx] ? inputs[inputIdx].value.trim().toUpperCase() : "";
          if (val !== word[i]) { allCorrect = false; }
          typedLetters[i] = val || "_";
          inputIdx++;
        }
      }
      if (allCorrect) { handleCorrect(); }
      else { state.lastAttempt = typedLetters.join(""); handleMissedAttempt(); }
    }

    // Scramble: click a tile from the pool to place it
    function scrambleSelect(id) {
      if (state.transitioning) return;
      const idx = state.scrambleRemaining.findIndex(x => x.id === id);
      if (idx === -1) return;
      const [item] = state.scrambleRemaining.splice(idx, 1);
      state.scrambleSelected.push(item);
      render();
    }

    // Scramble: click a placed tile to return it to the pool
    function scrambleDeselect(idx) {
      if (state.transitioning) return;
      const [item] = state.scrambleSelected.splice(idx, 1);
      state.scrambleRemaining.push(item);
      render();
    }

    function scrambleUndo() {
      if (state.transitioning || state.scrambleSelected.length === 0) return;
      const item = state.scrambleSelected.pop();
      state.scrambleRemaining.push(item);
      render();
    }

    function handleScrambleSubmit() {
      if (!state.currentWord || state.transitioning) return;
      if (state.scrambleSelected.length !== state.currentWord.word.length) return;
      const typed = state.scrambleSelected.map(x => x.l).join("");
      const correct = typed === state.currentWord.word.toUpperCase();
      if (correct) {
        handleCorrect();
      } else {
        state.lastAttempt = typed;
        // Reset tiles back to the pool so player can rearrange
        state.scrambleRemaining = [...state.scrambleSelected, ...state.scrambleRemaining];
        state.scrambleSelected = [];
        handleMissedAttempt();
      }
    }

    // One letter off: click a letter tile
    function oloClickLetter(idx) {
      if (state.transitioning) return;
      if (state.oloPhase === "fix" && state.selectedOloIndex === idx) {
        // Clicking the selected letter again deselects it
        state.selectedOloIndex = -1;
        state.oloPhase = "select";
        render();
        return;
      }
      if (state.oloPhase === "fix") {
        // Clicking a different letter switches the selection
        state.selectedOloIndex = idx;
        render();
        setTimeout(() => { const f = document.getElementById("olo-fix-input"); if (f) f.focus(); }, 100);
        return;
      }
      state.selectedOloIndex = idx;
      state.oloPhase = "fix";
      render();
      setTimeout(() => { const f = document.getElementById("olo-fix-input"); if (f) f.focus(); }, 100);
    }

    // One letter off: submit the fix
    function handleOloFix() {
      if (!state.currentWord || state.transitioning) return;
      const fixInput = document.getElementById("olo-fix-input");
      if (!fixInput) return;
      const typedLetter = fixInput.value.trim().toUpperCase();
      if (!typedLetter) return;

      const correctIndex = state.wrongIndex;
      const correctLetter = state.currentWord.word[correctIndex].toUpperCase();
      const selectedCorrectPosition = state.selectedOloIndex === correctIndex;
      const typedCorrectLetter = typedLetter === correctLetter;

      if (selectedCorrectPosition && typedCorrectLetter) {
        handleCorrect();
      } else {
        fixInput.value = "";
        // Wrong selection or wrong letter
        if (!selectedCorrectPosition) {
          // Wrong position — reset UI only, no attempt consumed
          state.oloPhase = "select";
          state.selectedOloIndex = -1;
          state.feedback = { type: "try", msg: "Wrong position — try again!" };
          render();
        } else {
          // Right position, wrong letter — consume an attempt
          handleMissedAttempt();
        }
      }
    }

    function selectCategory(id) { state.selectedCategory = id; startGame(); }

    function startGame() {
      if (!state.selectedCategory) return;
      clearSession();
      const key = getStatsKey();
      const cs = getCatStats(key);
      if (!cs.hasPlayed) {
        state.difficulty = 1;
        setCatStats(key, { hasPlayed: true, difficulty: 1 });
        state.warmupRamp = false;
      } else {
        state.difficulty = cs.difficulty;
        state.warmupRamp = cs.difficulty > 2;
      }
      state.sessionWordCount = 0;
      state.screen = "game"; state.lives = 3; state.score = 0;
      state.streak = 0; state.usedWords = []; state.currentWord = null; state.feedback = null;
      loadNextWord();
    }

    function revealHint() {
      if (!state.currentWord) return;
      state.hint = { definition: state.currentWord.definition, sentence: state.currentWord.sentence };
      state.hintUsed = true; render();
    }

    function goToMode(mode) {
      state.gameMode = mode;
      if (mode === "blitz") {
        startBlitzCountdown();
      } else if (mode === "mixed") {
        const all = [...SPELLING_CATEGORIES, ...QUIZ_CATEGORIES].filter(c => c.id !== "surprise");
        const pick = all[Math.floor(Math.random() * all.length)];
        selectCategory(pick.id);
      } else if (mode === "spelling") {
        state.selectedCategory = "surprise";
        startGame();
      } else {
        state.screen = mode;
        render();
      }
    }

    function goHome() {
      window.speechSynthesis.cancel();
      if (state.blitzTimerInterval) { clearInterval(state.blitzTimerInterval); state.blitzTimerInterval = null; }
      state.blitz = false;
      clearSession();
      state.screen = "home"; state.currentWord = null; state.feedback = null;
      render();
    }

    function startBlitzCountdown() {
      state.gameMode = "blitz";
      state.screen = "blitz-countdown";
      state.blitzCountdown = 3;
      render();
      const tick = setInterval(() => {
        state.blitzCountdown--;
        if (state.blitzCountdown <= 0) {
          clearInterval(tick);
          state.blitzCountdown = "GO";
          render();
          setTimeout(startBlitzGame, 650);
        } else {
          render();
        }
      }, 1000);
    }

    function startBlitzGame() {
      if (state.blitzTimerInterval) clearInterval(state.blitzTimerInterval);
      clearSession();
      state.blitz = true;
      state.blitzTimeRemaining = 60;
      state.blitzWordsCorrect = 0;
      state.blitzExpired = false;
      state.blitzStartTime = Date.now();
      state.blitzTimeSurvived = 0;
      state.difficulty = 1;
      state.selectedCategory = "surprise";
      state.screen = "game"; state.lives = 3; state.score = 0;
      state.streak = 0; state.usedWords = []; state.currentWord = null; state.feedback = null;
      const bs = getCatStats("blitz");
      if (!bs.hasPlayed) setCatStats("blitz", { hasPlayed: true, totalRuns: 0, bestWordsCorrect: 0, bestTimeSurvived: 0, wordsAttempted: 0, wordsCorrectFirstTry: 0 });
      state.blitzTimerInterval = setInterval(() => {
        if (!state.blitz || state.screen !== "game") { clearInterval(state.blitzTimerInterval); state.blitzTimerInterval = null; return; }
        state.blitzTimeRemaining = Math.max(0, state.blitzTimeRemaining - 0.1);
        const fill = document.getElementById("blitz-bar-fill");
        const num = document.getElementById("blitz-time-num");
        if (fill) {
          fill.style.width = `${(state.blitzTimeRemaining / 60) * 100}%`;
          fill.style.background = state.blitzTimeRemaining <= 10 ? "#ef4444" : state.blitzTimeRemaining <= 20 ? "#f97316" : "var(--yellow)";
        }
        if (num) num.textContent = Math.ceil(state.blitzTimeRemaining);
        if (state.blitzTimeRemaining <= 0 && !state.blitzExpired) state.blitzExpired = true;
      }, 100);
      loadNextWord();
    }

    function endBlitzGame() {
      if (state.blitzTimerInterval) { clearInterval(state.blitzTimerInterval); state.blitzTimerInterval = null; }
      state.blitz = false;
      const survived = Math.round((Date.now() - state.blitzStartTime) / 1000);
      state.blitzTimeSurvived = survived;
      const bs = getCatStats("blitz");
      setCatStats("blitz", {
        hasPlayed: true,
        totalRuns: (bs.totalRuns || 0) + 1,
        bestWordsCorrect: Math.max(bs.bestWordsCorrect || 0, state.blitzWordsCorrect),
        bestTimeSurvived: Math.max(bs.bestTimeSurvived || 0, survived),
      });
      saveProgress();
      clearSession();
      state.screen = "gameover";
      render();
    }

    function render() {
      const app = document.getElementById("app");

      // BLITZ COUNTDOWN
      if (state.screen === "blitz-countdown") {
        const isGo = state.blitzCountdown === "GO";
        app.innerHTML = `
        <div class="blitz-countdown-screen">
          <div class="${isGo ? 'countdown-go' : 'countdown-num'}">${state.blitzCountdown}</div>
          ${!isGo ? `<p style="font-size:13px;color:var(--muted);letter-spacing:1px">Get ready…</p>` : ""}
        </div>`;
        return;
      }

      // HOME
      if (state.screen === "home") {
        const savedSession = loadFromStorage("session");
        const showResume = savedSession && savedSession.lives > 0 && savedSession.score > 0;
        const allCatStats = Object.values(state.categoryStats);
        const overallBest = allCatStats.length ? Math.max(0, ...allCatStats.map(s => s.bestScore || 0)) : 0;
        const spellingStats = state.categoryStats["spelling"];
        const totalSpellingWords = spellingStats ? (spellingStats.wordsAttempted || 0) : 0;
        const themeBtn = `<button class="theme-toggle" onclick="toggleTheme()" title="Toggle day/night mode">${state.theme === 'day' ? '🌙' : '☀️'}</button>`;
        const tabsHTML = `
          <div class="home-tabs">
            <button class="tab-pill ${state.homeTab === 'play' ? 'active' : ''}" onclick="state.homeTab='play';render()">Play</button>
            <button class="tab-pill ${state.homeTab === 'stats' ? 'active' : ''}" onclick="state.homeTab='stats';render()">Stats</button>
          </div>`;

        if (state.homeTab === 'stats') {
          const bsStats = getCatStats("blitz");
          const blitzPlayed = bsStats.hasPlayed;
          const isWords = state.blitzStatView === "words";
          const blitzCard = blitzPlayed ? `
            <div class="blitz-hero-card">
              <div class="blitz-hero-header">
                <span class="blitz-hero-emoji">⚡</span>
                <span class="blitz-hero-name">Blitz</span>
                <div class="blitz-toggle">
                  <button class="blitz-toggle-btn ${isWords ? 'active' : ''}" onclick="state.blitzStatView='words';render()">Words</button>
                  <button class="blitz-toggle-btn ${!isWords ? 'active' : ''}" onclick="state.blitzStatView='time';render()">Time</button>
                </div>
              </div>
              <div class="blitz-hero-stat">
                ${isWords
              ? `<span class="blitz-hero-num">${bsStats.bestWordsCorrect || 0}</span><span class="blitz-hero-label">best words</span>`
              : `<span class="blitz-hero-num">${bsStats.bestTimeSurvived || 0}s</span><span class="blitz-hero-label">best time</span>`}
              </div>
              <div class="blitz-hero-meta">
                <span>${bsStats.totalRuns || 0} runs</span>
                ${bsStats.wordsAttempted ? `<span>${Math.round((bsStats.wordsCorrectFirstTry || 0) / bsStats.wordsAttempted * 100)}% first try</span>` : ""}
              </div>
            </div>` : `
            <div class="blitz-hero-card muted">
              <div class="blitz-hero-header"><span class="blitz-hero-emoji">⚡</span><span class="blitz-hero-name">Blitz</span></div>
              <p class="stat-card-unplayed">Not yet played</p>
            </div>`;

          const MIXED_CAT = { id: "mixed", name: "Mixed Mode", emoji: "🎲" };
          const SPELLING_STAT_CAT = { id: "spelling", name: "Spelling", emoji: "🐝" };
          const statsCats = [MIXED_CAT, SPELLING_STAT_CAT, ...QUIZ_CATEGORIES];
          const cards = statsCats.map(c => {
            const s = getCatStats(c.id);
            if (!s.hasPlayed) {
              return `<div class="stat-card muted">
                <div class="stat-card-header"><span class="stat-card-emoji">${c.emoji}</span><span class="stat-card-name">${c.name}</span></div>
                <p class="stat-card-unplayed">Not yet played</p>
              </div>`;
            }
            const winRate = s.wordsAttempted > 0 ? Math.round((s.wordsCorrectFirstTry / s.wordsAttempted) * 100) : 0;
            const mcWinRate = s.mcAttempted > 0 ? Math.round((s.mcCorrect / s.mcAttempted) * 100) : null;
            const diffPct = ((s.difficulty - 1) / 9) * 100;
            const isQuizCat = ["countries", "states", "elements", "flags"].includes(c.id);
            return `<div class="stat-card">
              <div class="stat-card-header"><span class="stat-card-emoji">${c.emoji}</span><span class="stat-card-name">${c.name}</span></div>
              <div class="stat-card-best">${s.bestScore}</div>
              <div class="stat-card-diff">
                <span class="stat-card-diff-label">${diffLabel(s.difficulty)}</span>
                <div class="stat-mini-bar"><div class="stat-mini-bar-fill" style="width:${diffPct}%"></div></div>
              </div>
              <div class="stat-card-meta">
                <span>${s.wordsAttempted} words</span>
                <span>${winRate}% first try</span>
              </div>
              ${isQuizCat && mcWinRate !== null ? `<div class="stat-card-meta" style="margin-top:4px"><span>👆 MC: ${mcWinRate}% (${s.mcAttempted} q's)</span></div>` : ""}
            </div>`;
          }).join("");
          app.innerHTML = `
          <div class="home">
            ${themeBtn}
            ${tabsHTML}
            <div class="stats-streak-banner">
              <span class="stats-streak-num">${state.dailyStreak}</span>
              <span class="stats-streak-label">day streak 🔥</span>
            </div>
            <div class="stats-list">${blitzCard}${cards}</div>
          </div>`;
          return;
        }

        app.innerHTML = `
      <div class="home">
        ${themeBtn}
        ${tabsHTML}
        <div class="logo-area">
          <div class="bee-icon">🐝</div>
          <h1>BeeSmart</h1>
          <p class="tagline">Sharpen your spelling. One word at a time.</p>
        </div>
        ${showResume ? `<button class="btn-primary" onclick="resumeGame()" style="margin-bottom:4px">▶ Resume game — ${savedSession.score} pts, ${savedSession.lives} ♥ left</button>` : ""}
        <div class="stats-row">
          <div class="stat-box"><span class="stat-num">${overallBest}</span><span class="stat-label">Best</span></div>
          <div class="stat-divider"></div>
          <div class="stat-box"><span class="stat-num">${state.dailyStreak}</span><span class="stat-label">Day Streak</span></div>
          <div class="stat-divider"></div>
          <div class="stat-box"><span class="stat-num">${totalSpellingWords}</span><span class="stat-label">Words</span></div>
        </div>
        <div class="mode-select">
          <button class="mode-btn spelling" onclick="goToMode('spelling')">
            <span class="mode-icon">🐝</span>
            <div class="mode-info">
              <div class="mode-title">Spelling</div>
              <div class="mode-subtitle">Listen, unscramble, fill the gaps &amp; more</div>
            </div>
            <span class="mode-arrow">&#8250;</span>
          </button>
          <button class="mode-btn quiz" onclick="goToMode('quiz')">
            <span class="mode-icon">🧠</span>
            <div class="mode-info">
              <div class="mode-title">Quiz</div>
              <div class="mode-subtitle">Capitals, elements, flags &amp; more</div>
            </div>
            <span class="mode-arrow">&#8250;</span>
          </button>
          <button class="mode-btn mixed" onclick="goToMode('mixed')">
            🎲 &nbsp; Mixed Mode — a bit of everything
          </button>
          <button class="mode-btn blitz" onclick="goToMode('blitz')">
            ⚡ &nbsp; Blitz — 60 seconds, go!
          </button>
        </div>
        <div class="how-to">
          <p class="how-to-title">How to play</p>
          <p class="how-to-text">3 lives per game. Difficulty adapts as you play. Hints are available in spelling mode but cost points.</p>
        </div>
      </div>`;
        return;
      }

      // QUIZ CATEGORY SELECT
      if (state.screen === "quiz") {
        const quizBtns = QUIZ_CATEGORIES.map(c =>
          `<button class="cat-btn quiz-mode" onclick="selectCategory('${c.id}')"><span class="cat-emoji">${c.emoji}</span><span class="cat-name">${c.name}</span></button>`
        ).join("");
        app.innerHTML = `
      <div class="home">
        <button class="back-btn" onclick="state.screen='home';render()">&#8592; Back</button>
        <div class="logo-area">
          <div class="bee-icon">🧠</div>
          <p style="font-size:20px;color:#7aadff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;margin-top:4px">Quiz</p>
        </div>
        <div style="width:100%">
          <p class="section-title">Choose a quiz</p>
          <div class="quiz-grid">${quizBtns}</div>
        </div>
      </div>`;
        return;
      }

      // GAME OVER
      if (state.screen === "gameover") {
        const isBlitzOver = state.gameMode === "blitz";
        if (isBlitzOver) {
          const blitzBs = getCatStats("blitz");
          const blitzNewBest = state.blitzWordsCorrect > 0 && state.blitzWordsCorrect >= (blitzBs.bestWordsCorrect || 0);
          app.innerHTML = `
          <div class="gameover">
            <div class="share-card">
              <div class="gameover-bee">⚡</div>
              <h2 class="gameover-title">Blitz Over</h2>
              <div class="gameover-score">${state.blitzWordsCorrect}</div>
              <p class="gameover-label">words correct</p>
              <p class="gameover-cat">⏱ ${state.blitzTimeSurvived}s survived</p>
              ${blitzNewBest ? `<p class="new-best">✨ New best!</p>` : ""}
            </div>
            <button class="share-btn" onclick="showShareToast()">🔗 Share result</button>
            <div style="height:4px"></div>
            <button class="btn-primary" onclick="startBlitzCountdown()">PLAY AGAIN</button>
            <button class="btn-secondary" onclick="state.screen='home';render()">Home</button>
          </div>`;
        } else {
          const gameOverKey = getStatsKey();
          const gameOverCatStats = getCatStats(gameOverKey);
          const newBest = state.score > 0 && state.score >= gameOverCatStats.bestScore;
          const catId = state.gameMode === "mixed" ? "mixed" : state.selectedCategory;
          const cat = catId === "mixed" ? { emoji: "🎲", name: "Mixed Mode" } : CATEGORIES.find(c => c.id === catId);
          app.innerHTML = `
          <div class="gameover">
            <div class="share-card">
              <div class="gameover-bee">🐝</div>
              <h2 class="gameover-title">Game Over</h2>
              <div class="gameover-score">${state.score}</div>
              <p class="gameover-label">points</p>
              ${cat ? `<p class="gameover-cat">${cat.emoji} ${cat.name}</p>` : ""}
              ${newBest ? `<p class="new-best">✨ New personal best!</p>` : ""}
            </div>
            <button class="share-btn" onclick="showShareToast()">🔗 Share result</button>
            <div style="height:4px"></div>
            <button class="btn-primary" onclick="startGame()">PLAY AGAIN</button>
            <button class="btn-secondary" onclick="state.screen='home';render()">${state.gameMode === "quiz" ? "Change Category" : "Home"}</button>
          </div>`;
        }
        return;
      }

      // GAME
      const hearts = [0, 1, 2].map(i => `<span class="heart ${i < state.lives ? "" : "lost"}">♥</span>`).join("");
      const diffPct = ((state.difficulty - 1) / 9) * 100;
      const blitzTimePct = Math.max(0, (state.blitzTimeRemaining / 60) * 100);
      const blitzBarColor = state.blitzTimeRemaining <= 10 ? "#ef4444" : state.blitzTimeRemaining <= 20 ? "#f97316" : "var(--yellow)";

      let cardHTML = "";
      if (state.loading) {
        const loadCat = CATEGORIES.find(c => c.id === state.selectedCategory);
        cardHTML = `<div class="loading-wrap"><div class="loading-bee">🐝</div><p class="loading-text">Finding your ${loadCat ? loadCat.name.toLowerCase() : "next"} word…</p></div>`;
      } else if (state.currentWord) {
        const sw = state.currentWord.word.replace(/'/g, "\\'");
        let inner = "";

        if (state.mechanic === "audio") {
          inner = `<button class="speak-btn" onclick="speak('${sw}')">🔊 Hear word again</button><p class="cat-tag">${state.currentWord.category}</p>`;

        } else if (state.mechanic === "definition") {
          const isFlag = state.currentWord.isFlag;
          const defDisplay = isFlag
            ? `<div style="font-size:80px;line-height:1.3;margin-bottom:8px">${state.currentWord.definition}</div>`
            : `<p class="def-text">"${state.currentWord.definition}"</p>`;
          const sentenceClue = (!isFlag && state.currentWord.sentence) ? `<p class="def-text" style="margin-top:8px;font-style:italic;opacity:0.8">${state.currentWord.sentence}</p>` : "";
          inner = `${defDisplay}<p class="cat-tag">${state.currentWord.category}</p>${sentenceClue}`;

        } else if (state.mechanic === "scramble") {
          const placed = state.scrambleSelected.map(x => x.l).join("");
          const remaining = "_".repeat(state.currentWord.word.length - placed.length);
          const displaySize = state.currentWord.word.length > 12 ? '18px' : '24px';
          const poolTiles = state.scrambleRemaining.map(x =>
            `<span class="s-letter" onclick="scrambleSelect(${x.id})">${x.l}</span>`
          ).join("");
          inner = `
<div class="scramble-text-display" style="font-size:${displaySize}"><span class="scramble-placed">${placed}</span><span class="scramble-empty">${remaining}</span></div>
<div style="display:flex;justify-content:flex-end;margin-top:6px">
  <button class="scramble-undo-btn" onclick="scrambleUndo()" ${state.scrambleSelected.length === 0 ? 'disabled' : ''}>⌫ Undo</button>
</div>
<div class="scramble-row" style="margin-top:10px">${poolTiles}</div>
<p class="cat-tag" style="margin-top:10px">${state.currentWord.category}</p>
<p class="def-text" style="margin-top:8px">"${state.currentWord.definition}"</p>`;

        } else if (state.mechanic === "lettergap") {
          const gapWord = state.currentWord.word.toUpperCase();
          const hiddenCount = state.gapIndices.filter(Boolean).length;
          let hiddenIdx = 0;
          const letterTiles = gapWord.split("").map((l, i) => {
            if (state.gapIndices[i]) {
              const idx = hiddenIdx++;
              return `<input class="gap-input" id="gap-${idx}" maxlength="1" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" oninput="gapInputNext(${idx},${hiddenCount})" onkeydown="gapKeyDown(event,${idx},${hiddenCount})"/>`;
            }
            return `<span class="gap-letter shown">${l}</span>`;
          }).join("");
          inner = `
        <div class="gap-row">${letterTiles}</div>
        <p class="gap-instruction">Type the missing letters</p>
        <p class="def-text" style="margin-top:8px">"${state.currentWord.definition}"</p>`;

        } else if (state.mechanic === "oneletteroff") {
          const display = state.misspelled || state.currentWord.word;
          const tiles = display.toUpperCase().split("").map((l, i) => {
            let cls = "olo-letter";
            if (state.selectedOloIndex === i) cls += " selected-wrong";
            return `<span class="${cls}" onclick="oloClickLetter(${i})">${l}</span>`;
          }).join("");
          let fixHTML = "";
          if (state.oloPhase === "fix") {
            fixHTML = `<div class="olo-fix-row">
          <span class="olo-fix-label">Replace with:</span>
          <input id="olo-fix-input" class="olo-fix-input" maxlength="1" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" onkeydown="if(event.key==='Enter')handleOloFix()"/>
          <button class="olo-submit" onclick="handleOloFix()">→</button>
        </div>`;
          }
          inner = `
        <p class="olo-instruction">${state.oloPhase === "select" ? "Tap the letter that is spelled incorrectly" : "Type the correct letter"}</p>
        <div class="olo-row" style="margin-top:12px">${tiles}</div>
        ${fixHTML}
        <p class="cat-tag" style="margin-top:12px">${state.currentWord.category}</p>
        <p class="def-text" style="margin-top:8px">"${state.currentWord.definition}"</p>`;
        }

        cardHTML = `<div class="word-card">${inner}</div>`;
      }

      const mechanicLabels = {
        audio: "🔊 Listen & Spell",
        definition: "📖 Define & Spell",
        scramble: "🔀 Unscramble",
        lettergap: "✏️ Fill the Gaps",
        oneletteroff: "🔍 One Letter Off",
      };

      const showMC = state.isMultipleChoice && state.currentWord && !state.loading;
      const showStandardInput = !showMC && state.currentWord && !state.loading && ["audio", "definition"].includes(state.mechanic);
      const showGapSubmit = !showMC && state.currentWord && !state.loading && state.mechanic === "lettergap";
      const showScrambleSubmit = !showMC && state.currentWord && !state.loading && state.mechanic === "scramble";
      const hintAllowed = !state.blitz;

      let mcButtonsHTML = "";
      if (showMC && state.multipleChoiceOptions.length > 0) {
        // For flags, look up the flag emoji for each option
        const isFlagsMode = state.selectedCategory === "flags";
        mcButtonsHTML = state.multipleChoiceOptions.map(opt => {
          let btnContent = opt.answer;
          let btnClass = "mc-btn";
          if (state.mcAnswered) {
            btnClass += opt.isCorrect ? " mc-correct" : (opt.answer === state.lastAttempt ? " mc-wrong" : "");
          }
          if (isFlagsMode) {
            const flagEntry = FLAGS.find(f => f.country === opt.answer);
            const flagEmoji = flagEntry ? flagEntry.flag : "";
            btnContent = `<span class="mc-flag-emoji">${flagEmoji}</span><span class="mc-flag-label">${opt.answer}</span>`;
          }
          return `<button class="${btnClass}" onclick="handleMCAnswer('${opt.answer.replace(/'/g, "\\'")}')" ${state.mcAnswered || state.transitioning ? "disabled" : ""}>${btnContent}</button>`;
        }).join("");
      }

      const footerHTML = `
        ${showMC ? `<div class="mc-options">${mcButtonsHTML}</div>` : ""}
        ${showStandardInput ? `
          <div class="input-row">
            <input id="word-input" type="text" placeholder="Type your spelling…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" ${state.transitioning ? "disabled" : ""}/>
            <button class="submit-btn" onclick="handleSubmit()" ${state.transitioning ? "disabled" : ""}>→</button>
          </div>
          ${hintAllowed && !state.hint && !state.transitioning ? `<button class="hint-btn" onclick="revealHint()">💡 Reveal hint (costs points)</button>` : ""}
        ` : ""}
        ${showGapSubmit ? `
          <button class="btn-primary" onclick="handleGapSubmit()" ${state.transitioning ? "disabled" : ""}>Check Answers</button>
          ${hintAllowed && !state.hint && !state.transitioning ? `<button class="hint-btn" onclick="revealHint()">💡 Reveal hint (costs points)</button>` : ""}
        ` : ""}
        ${showScrambleSubmit ? `
          <button class="btn-primary" onclick="handleScrambleSubmit()" ${state.transitioning || state.scrambleSelected.length !== state.currentWord.word.length ? "disabled" : ""}>Check</button>
          ${hintAllowed && !state.hint && !state.transitioning ? `<button class="hint-btn" onclick="revealHint()">💡 Reveal hint (costs points)</button>` : ""}
        ` : ""}`;

      app.innerHTML = `
    <div class="game-screen">
      <div class="game-header">
        <div style="display:flex;align-items:center;gap:8px">
          <button class="home-btn" onclick="goHome()" title="Home">⌂</button>
          ${state.blitz
          ? `<span class="blitz-badge">⚡ Blitz</span>`
          : `<div class="lives">${hearts}</div>`}
        </div>
        <div class="score-area">
          ${state.blitz
          ? `<span class="score-num">${state.blitzWordsCorrect}</span><span style="font-size:12px;color:var(--muted);margin-left:4px">words</span>`
          : `<span class="score-num">${state.score}</span>`}
          ${state.streak >= 2 ? `<span class="streak-pill">🔥 ${state.streak}</span>` : ""}
        </div>
      </div>
      ${state.blitz ? `
      <div class="blitz-timer-wrap">
        <div class="blitz-time-row">
          <span class="blitz-time-label">${diffLabel(state.difficulty)}</span>
          <span id="blitz-time-num" class="blitz-time-num">${Math.ceil(state.blitzTimeRemaining)}</span>
        </div>
        <div class="blitz-bar-track">
          <div id="blitz-bar-fill" class="blitz-bar-fill" style="width:${blitzTimePct}%;background:${blitzBarColor}"></div>
        </div>
      </div>` : `
      <div class="diff-bar-wrap">
        <div class="diff-bar-label">
          <span class="diff-bar-value">${diffLabel(state.difficulty)}</span>
        </div>
        <div class="diff-bar-track"><div class="diff-bar-fill" style="width:${diffPct}%"></div></div>
      </div>`}
      <div class="game-body">
        ${state.currentWord && !state.loading ? `<p class="mechanic-badge">${state.isMultipleChoice ? "👆 Multiple Choice" : (mechanicLabels[state.mechanic] || "")}</p>` : ""}
        ${cardHTML}
        ${state.feedback ? `<div class="feedback ${state.feedback.type}">${state.feedback.msg}${state.lastAttempt && state.feedback.type !== 'correct' && state.mechanic !== 'oneletteroff' ? `<div style="margin-top:6px;font-size:0.88em;opacity:0.9">You typed: <span style="color:#ff8a80">"${state.lastAttempt}"</span></div>` : ''}</div>` : ""}
        ${state.hint ? `<div class="hint-box"><p class="hint-text"><span class="hint-label">Definition:</span> ${state.hint.definition}</p><p class="hint-text"><span class="hint-label">Example:</span> ${state.hint.sentence}</p></div>` : ""}
      </div>
      <div class="game-footer">${footerHTML}</div>
    </div>`;

      const inp = document.getElementById("word-input");
      if (inp) inp.addEventListener("keydown", e => { if (e.key === "Enter") handleSubmit(); });

      // Focus first gap input
      if (state.mechanic === "lettergap" && !state.loading) {
        setTimeout(() => { const g = document.getElementById("gap-0"); if (g) g.focus(); }, 100);
      }
    }

    // Auto-advance between gap inputs
    function gapInputNext(idx, total) {
      const inp = document.getElementById(`gap-${idx}`);
      if (inp && inp.value.length === 1 && idx < total - 1) {
        const next = document.getElementById(`gap-${idx + 1}`);
        if (next) next.focus();
      }
    }

    function gapKeyDown(e, idx, total) {
      if (e.key === "Backspace") {
        const inp = document.getElementById(`gap-${idx}`);
        if (inp && inp.value === "" && idx > 0) {
          const prev = document.getElementById(`gap-${idx - 1}`);
          if (prev) { prev.value = ""; prev.focus(); }
        }
      }
      if (e.key === "Enter") handleGapSubmit();
    }

    initStorage();
    render();
  </script>
</body>

</html>
