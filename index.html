        if (fill) {
          fill.style.width = `${(state.blitzTimeRemaining / 60) * 100}%`;
          fill.style.background = state.blitzTimeRemaining <= 10 ? "#ef4444" : state.blitzTimeRemaining <= 20 ? "#f97316" : "var(--yellow)";
        }
        if (num) num.textContent = Math.ceil(state.blitzTimeRemaining);
        if (state.blitzTimeRemaining <= 0 && !state.blitzExpired) {
          state.blitzExpired = true;
          state.blitzExpiredTime = Date.now();
        }
      }, 100);
      loadNextWord();
    }

    function renderMathKeyboard() {
      const keys = ['7','8','9','4','5','6','1','2','3','.','0','⌫','✓'];
      const btns = keys.map(k => {
        if (k === '⌫') return `<button class="math-key del-key" onpointerdown="mathKeyPress(event,'DEL')">⌫</button>`;
        if (k === '✓') return `<button class="math-key submit-key" onpointerdown="mathKeyPress(event,'SUBMIT')">✓</button>`;
        if (k === '.') return `<button class="math-key dec-key" onpointerdown="mathKeyPress(event,'.')">${k}</button>`;
        return `<button class="math-key" onpointerdown="mathKeyPress(event,'${k}')">${k}</button>`;
      }).join('');
      return `
        <div class="math-display">${state.mathInput || '?'}</div>
        <div class="math-keyboard">${btns}</div>`;
    }

    function isMathAnswerAccepted(input, correct, tolerance) {
      const userVal = parseFloat(input);
      if (isNaN(userVal)) return false;
      // Within absolute tolerance (handles integer answers and tip rounding)
      if (Math.abs(userVal - correct) <= Math.max(tolerance, 0.0001)) return true;
      // Valid precision-matched approximation:
      // strip trailing zeros, count how many decimal places the user typed,
      // then accept if their value equals either the truncation or rounding
      // of the correct answer to that many places.
      const decStr = input.includes('.') ? input.split('.')[1].replace(/0+$/, '') : '';
      if (decStr.length > 0) {
        const factor = Math.pow(10, decStr.length);
        const truncated = Math.floor(correct * factor) / factor;
        const rounded = Math.round(correct * factor) / factor;
        if (Math.abs(userVal - truncated) < 0.00001 || Math.abs(userVal - rounded) < 0.00001) return true;
      }
      return false;
    }

    function mathKeyPress(event, key) {
      event.preventDefault();
      if (state.transitioning) return;
      if (key === 'DEL') {
        state.mathInput = state.mathInput.slice(0, -1);
        render();
      } else if (key === 'SUBMIT') {
        if (!state.mathInput || state.mathInput === '.') return;
        const tol = state.currentWord.tolerance || 0;
        if (isMathAnswerAccepted(state.mathInput, state.currentWord.answer, tol)) {
          handleCorrect();
        } else {
          state.mathInput = "";
          handleMissedAttempt();
        }
      } else if (key === '.') {
        if (state.mathInput.includes('.')) return;
        if (!state.mathInput) state.mathInput = '0';
        state.mathInput += '.';
        render();
      } else {
        if (state.mathInput.length >= 7) return;
        state.mathInput += key;
        render();
      }
    }

    function renderMechanicCard() {
      if (state.loading) {
        const loadCat = CATEGORIES.find(c => c.id === state.selectedCategory);
        return `<div class="loading-wrap"><div class="loading-bee">🐝</div><p class="loading-text">Finding your ${loadCat ? loadCat.name.toLowerCase() : "next"} word…</p></div>`;
      }
      if (!state.currentWord) return "";

      const sw = state.currentWord.word.replace(/'/g, "\\'");
      let inner = "";

      if (state.mechanic === "definition") {
        const isFlag = state.currentWord.isFlag;
        const defDisplay = isFlag
          ? `<div style="font-size:80px;line-height:1.3;margin-bottom:8px">${state.currentWord.definition}</div>`
          : `<p class="def-text">"${state.currentWord.definition}"</p>`;
        const sentenceClue = (!isFlag && state.currentWord.sentence) ? `<p class="def-text" style="margin-top:8px;font-style:italic;opacity:0.8">${state.currentWord.sentence}</p>` : "";
        inner = `${defDisplay}${state.currentWord.isCapitals ? "" : `<p class="cat-tag">${state.currentWord.category}</p>`}${sentenceClue}`;
        if (state.currentWord.isMath && !state.isMultipleChoice) {
          inner += renderMathKeyboard();
        }

      } else if (state.mechanic === "scramble") {
        const word = state.currentWord.word;
        const wordLen = word.length;
        const displaySize = wordLen > 14 ? '14px' : wordLen > 10 ? '18px' : '24px';
        // Build unified slot array merging hint-locked and player-placed positions
        const slots = Array(wordLen).fill(null).map((_, i) => {
          if (state.hintRevealed && state.hintRevealed[i] !== null && state.hintRevealed[i] !== undefined) {
            return { letter: state.hintRevealed[i].toUpperCase(), type: 'hint' };
          }
          return { letter: '_', type: 'empty' };
        });
        let placedIdx = 0;
        for (let i = 0; i < wordLen && placedIdx < state.scrambleSelected.length; i++) {
          if (slots[i].type === 'empty') {
            slots[i] = { letter: state.scrambleSelected[placedIdx].l, type: 'placed' };
            placedIdx++;
          }
        }
        const answerBar = slots.map(s => {
          if (s.type === 'hint') return `<span class="scramble-hint-slot">${s.letter}</span>`;
          if (s.type === 'placed') return `<span class="scramble-placed">${s.letter}</span>`;
          return `<span class="scramble-empty">_</span>`;
        }).join('');
        const poolTiles = state.scrambleRemaining.map(x =>
          `<span class="s-letter" onclick="scrambleSelect(${x.id})">${x.l}</span>`
        ).join("");
        inner = `
<div class="scramble-text-display" style="font-size:${displaySize}">${answerBar}</div>
<div style="display:flex;justify-content:flex-end;margin-top:6px">
  <button class="scramble-undo-btn" onclick="scrambleUndo()" ${state.scrambleSelected.length === 0 ? 'disabled' : ''}>⌫ Undo</button>
</div>
<div class="scramble-row" style="margin-top:10px">${poolTiles}</div>
<p class="cat-tag" style="margin-top:10px">${state.currentWord.category}</p>
<p class="def-text" style="margin-top:8px">"${state.currentWord.definition}"</p>`;

      } else if (state.mechanic === "lettergap") {
        const gapWord = state.currentWord.word.toUpperCase();
        const wordLen = gapWord.length;
        const tileSizeClass = wordLen > 14 ? 'gap-tile-sm' : wordLen > 10 ? 'gap-tile-md' : '';
        const hiddenCount = state.gapIndices.filter(Boolean).length;
        let hiddenIdx = 0;
        const letterTiles = gapWord.split("").map((l, i) => {
          if (state.gapIndices[i]) {
            const idx = hiddenIdx++;
            const hinted = state.hintRevealed && state.hintRevealed[i];
            if (hinted) {
              return `<input class="gap-input gap-hinted" id="gap-${idx}" maxlength="1" value="${hinted.toUpperCase()}" disabled/>`;
            }
            return `<input class="gap-input${state.activeGapIndex === idx ? ' gap-active' : ''}" id="gap-${idx}" maxlength="1" readonly value="${state.gapValues[idx] || ''}" onpointerdown="setActiveGap(event,${idx})"/>`;
          }
          return `<span class="gap-letter shown">${l}</span>`;
        }).join("");
        inner = `
        <div class="gap-row ${tileSizeClass}">${letterTiles}</div>
        <p class="def-text" style="margin-top:8px">"${state.currentWord.definition}"</p>`;

      } else if (state.mechanic === "oneletteroff") {
        const display = state.misspelled || state.currentWord.word;
        const oloLen = display.length;
        const oloSizeClass = oloLen > 14 ? 'olo-tile-sm' : oloLen > 10 ? 'olo-tile-md' : '';
        const tiles = display.toUpperCase().split("").map((l, i) => {
          let cls = "olo-letter";
          if (state.selectedOloIndex === i) cls += " selected-wrong";
          return `<span class="${cls}" onpointerdown="event.preventDefault();oloClickLetter(${i})">${l}</span>`;
        }).join("");
        const oloKeys = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("")
          .map(l => `<button class="olo-key" onpointerdown="event.preventDefault();oloPickLetter('${l}')">${l}</button>`)
          .join("");
        const fixHTML = `<div class="olo-fix-section" style="${state.oloPhase !== 'fix' ? 'visibility:hidden' : ''}">
          <p class="olo-fix-label">Replace with:</p>
          <div class="olo-key-grid">${oloKeys}</div>
        </div>`;
        inner = `
        <p class="olo-instruction">${state.oloPhase === "select" ? "Tap the incorrect letter" : "Tap the correct letter"}</p>
        <div class="olo-row ${oloSizeClass}" style="margin-top:12px${state.transitioning ? ';pointer-events:none' : ''}">${tiles}</div>
        ${fixHTML}
        <p class="cat-tag" style="margin-top:12px">${state.currentWord.category}</p>
        <p class="def-text" style="margin-top:8px">"${state.currentWord.definition}"</p>`;

      } else if (state.mechanic === "typewriter") {
        const hint = state.currentWord.definition
          ? `<p class="def-text" style="margin-top:12px">"${state.currentWord.definition}"</p>`
          : "";
        const catTag = `<p class="cat-tag">${state.currentWord.category}</p>`;
        if (!state.typewriterRevealed) {
          inner = `
        <p class="tw-instruction">Watch carefully…</p>
        <div id="typewriter-display" class="typewriter-display"></div>
        ${catTag}
        ${hint}`;
        } else {
          inner = `
        <p class="tw-instruction">Now spell it from memory:</p>
        <div class="typewriter-display tw-done">?</div>
        ${catTag}
        ${hint}`;
        }

      } else if (state.mechanic === "wordsearch") {
        const grid = state.wordsearchGrid;
        const size = grid.length;
        const gap = 2;
        const cs = wsComputeCellSize();
        const stride = cs + gap;
        const gridPx = size * stride - gap;
        const sw = Math.round(cs * 0.72);
        const hintSet = new Set(
          state.wordsearchPath.slice(0, state.hintLevel).map(({row, col}) => `${row},${col}`)
        );
        const selSet = new Set(state.wordsearchSelected.map(({row, col}) => `${row},${col}`));
        const cells = grid.flatMap((row, r) =>
          row.map((cell, c) => {
            const isHint = hintSet.has(`${r},${c}`);
            const isSelected = selSet.has(`${r},${c}`);
            const extraStyle = isHint
              ? ';background:var(--border);color:var(--yellow);border-color:var(--yellow);opacity:0.85'
              : isSelected ? ';color:var(--yellow)' : '';
            return `<div class="ws-cell${isHint ? ' ws-hint-cell' : ''}${isSelected ? ' ws-selected' : ''}" id="wsc-${r}-${c}" data-row="${r}" data-col="${c}" style="width:${cs}px;height:${cs}px;line-height:${cs}px;font-size:${Math.round(cs * 0.42)}px${extraStyle}">${cell.letter}</div>`;
          })
        ).join('');
        const initPoints = state.wordsearchSelected.length > 0
          ? state.wordsearchSelected.map(s => `${s.col * stride + cs / 2},${s.row * stride + cs / 2}`).join(' ')
          : '';
        inner = `
        <p class="def-text" style="margin-bottom:10px">"${state.currentWord.definition}"</p>
        <p class="cat-tag" style="margin-bottom:10px">${state.currentWord.category}</p>
        <div class="ws-wrap" style="width:${gridPx}px;height:${gridPx}px;margin:0 auto">
          <div class="ws-grid" id="ws-grid" data-cell-size="${cs}"
            style="display:grid;touch-action:none;user-select:none;grid-template-columns:repeat(${size},${cs}px);gap:${gap}px;width:${gridPx}px;height:${gridPx}px"
            onpointerdown="wsPointerDown(event)" onpointermove="wsPointerMove(event)" onpointerup="wsPointerUp(event)" onpointerleave="wsPointerUp(event)">
            ${cells}
          </div>
          <svg class="ws-svg" style="pointer-events:none" width="${gridPx}" height="${gridPx}" viewBox="0 0 ${gridPx} ${gridPx}">
            <polyline id="ws-line" fill="none" stroke="var(--yellow)" stroke-opacity="0.45" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" points="${initPoints}"/>
          </svg>
        </div>`;
      }

      return `<div class="word-card">${inner}</div>`;
    }

      const showStandardInput = showWordInput; // alias kept for clarity
      const showGapSubmit = !showMC && state.currentWord && !state.loading && state.mechanic === "lettergap";
      const showBuiltinKeyboard = showWordInput || showGapSubmit;
      const showScrambleSubmit = !showMC && state.currentWord && !state.loading && state.mechanic === "scramble";
      const showWordsearchSubmit = !showMC && state.currentWord && !state.loading && state.mechanic === "wordsearch";
      const hintAllowed = !state.blitz;
      const hintLengthKnown = ["lettergap", "scramble", "oneletteroff", "wordsearch"].includes(state.mechanic);
      const hintFirstLabel = hintLengthKnown ? 'Reveal a letter (−1 pt)' : 'Show word length (−1 pt)';
      const hintLabel = state.hintLevel === 0 ? hintFirstLabel : `Reveal a letter (−${state.hintLevel + 1} pts)`;
      // For lettergap, only count unhinted gap positions; for wordsearch count unrevealed path cells; elsewhere count all nulls
      const hintableCount = state.mechanic === "wordsearch"
        ? state.wordsearchPath.length - state.hintLevel
        : (state.hintLevel >= 1 && state.hintRevealed.length)
          ? (state.mechanic === "lettergap" && state.gapIndices

              : state.hintRevealed.filter(v => v === null).length)
          : Infinity;
      const hintStillAvailable = hintableCount > 1;

      if (showMC && state.multipleChoiceOptions.length > 0) {

          return `<button class="${btnClass}" onclick="handleMCAnswer('${opt.answer.replace(/'/g, "\\'")}')" ${state.mcAnswered || state.transitioning ? "disabled" : ""}>${btnContent}</button>`;

        ${showWordInput ? `
          <div class="input-row">
            <input id="word-input" type="text" placeholder="Type your spelling…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" readonly value="${state.wordInput}" ${state.transitioning ? "disabled" : ""}/>
            <button class="submit-btn" onclick="BeeSounds.click();handleSubmit()" ${state.transitioning ? "disabled" : ""}>→</button>
          </div>
          ${hintAllowed && !state.transitioning && hintStillAvailable ? `<button class="hint-btn" onclick="revealNextHint()">💡 ${hintLabel}</button>` : ""}
        ` : ""}
        ${showGapSubmit ? `
          <button class="btn-primary" onclick="BeeSounds.click();handleGapSubmit()" ${state.transitioning ? "disabled" : ""}>Check Answers</button>
          ${hintAllowed && !state.transitioning && hintStillAvailable ? `<button class="hint-btn" onclick="revealNextHint()">💡 ${hintLabel}</button>` : ""}
        ` : ""}
        ${showBuiltinKeyboard ? `
          <div class="builtin-keyboard"${state.transitioning ? ' style="opacity:0.5;pointer-events:none"' : ""}>
            <div class="kb-row">${"QWERTYUIOP".split("").map(l => `<button class="kb-key" onpointerdown="kbPress(event,'${l}')">${l}</button>`).join("")}</div>
            <div class="kb-row">${"ASDFGHJKL".split("").map(l => `<button class="kb-key" onpointerdown="kbPress(event,'${l}')">${l}</button>`).join("")}</div>
            <div class="kb-row">
              <button class="kb-key kb-submit" onpointerdown="kbSubmit(event)">→</button>
              ${"ZXCVBNM".split("").map(l => `<button class="kb-key" onpointerdown="kbPress(event,'${l}')">${l}</button>`).join("")}
              <button class="kb-key kb-backspace" onpointerdown="kbBackspace(event)">⌫</button>
            </div>
            ${showWordInput ? `<div class="kb-row"><button class="kb-key kb-space" onpointerdown="kbPress(event,' ')">SPACE</button></div>` : ""}
          </div>
        ` : ""}
        ${showScrambleSubmit ? `
          <button class="btn-primary" onclick="BeeSounds.click();handleScrambleSubmit()" ${state.transitioning || state.scrambleSelected.length !== state.currentWord.word.length ? "disabled" : ""}>Check</button>
          ${hintAllowed && !state.transitioning && hintStillAvailable ? `<button class="hint-btn" onclick="revealNextHint()">💡 ${hintLabel}</button>` : ""}
        ` : ""}
        ${showWordsearchSubmit ? `
          <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
            <button id="ws-check-btn" class="btn-primary" onclick="BeeSounds.click();handleWordsearchSubmit()" ${state.transitioning || state.wordsearchSelected.length === 0 ? "disabled" : ""}>Check</button>
            <button id="ws-clear-btn" class="hint-btn" onclick="wsUndo()" ${state.wordsearchSelected.length === 0 ? "disabled" : ""}>✕ Clear</button>
          </div>
          ${hintAllowed && !state.transitioning && hintStillAvailable ? `<button class="hint-btn" onclick="revealNextHint()">💡 ${hintLabel}</button>` : ""}
        ` : ""}
        ${state.blitz && state.currentWord && !state.loading && !state.transitioning ? `
          <button class="skip-btn" onclick="skipWord()">Skip −3s</button>
        ` : ""}`;

      app.innerHTML = `
    <div class="game-screen">
      <div class="game-header">
        <div style="display:flex;align-items:center;gap:8px">
          <button class="home-btn" onclick="BeeSounds.click();goHome()" title="Home">⌂</button>
          ${state.blitz
          ? `<span class="blitz-badge">⚡ BeeBlitz</span>`
          : `<div class="lives">${hearts}</div>`}
        </div>
        <div class="score-area">
          ${state.blitz
          ? `<span class="score-num">${state.blitzWordsCorrect}</span><span style="font-size:12px;color:var(--muted);margin-left:4px">words</span>`
          : `<span class="score-num">${state.score}</span>`}
          ${state.streak >= 2 ? `<span class="streak-pill">🔥 ${state.streak}</span>` : ""}
        </div>
      </div>
      ${state.blitz ? `
      <div class="blitz-timer-wrap">
        <div class="blitz-time-row">
          <span class="blitz-time-label">${diffLabel(state.difficulty)}</span>
          <span id="blitz-time-num" class="blitz-time-num">${Math.ceil(state.blitzTimeRemaining)}</span>
        </div>
        <div class="blitz-bar-track">
          <div id="blitz-bar-fill" class="blitz-bar-fill" style="width:${blitzTimePct}%;background:${blitzBarColor}"></div>
        </div>
      </div>` : `
      <div class="diff-bar-wrap">
        <div class="diff-bar-label">
          <span class="diff-bar-value">${diffLabel(state.difficulty)}</span>
        </div>
        <div class="diff-bar-track"><div class="diff-bar-fill" style="width:${diffPct}%"></div></div>
      </div>`}
      <div class="game-body">
        ${cardHTML}
        ${state.feedback ? `<div class="feedback ${state.feedback.type}">${state.feedback.msg}${state.lastAttempt && state.feedback.type !== 'correct' && state.mechanic !== 'oneletteroff' ? `<div style="margin-top:6px;font-size:0.88em;opacity:0.9">You typed: <span style="color:#ff8a80">"${state.lastAttempt}"</span></div>` : ''}</div>` : ""}
        ${state.hintLevel >= 1 && state.mechanic !== "lettergap" && state.mechanic !== "scramble" ? `
  <div class="hint-tiles">
    ${state.hintRevealed.map(ch =>
      ch ? `<span class="hint-tile revealed">${ch.toUpperCase()}</span>`
         : `<span class="hint-tile blank"></span>`
    ).join('')}
  </div>` : ""}
      </div>
      <div class="game-footer">${footerHTML}</div>
    </div>`;

      // Focus first non-hinted gap input — skip in blitz to prevent native iOS keyboard popping up
      if (state.mechanic === "lettergap" && !state.loading && !state.blitz) {
        setTimeout(() => {
          const g = document.querySelector(".gap-input:not([disabled])");
          if (g) g.focus();
        }, 100);
      }

      // Scroll built-in keyboard into view when fill-in-the-blank input is shown
      if (showStandardInput && !state.transitioning) {
        setTimeout(() => { const kb = document.querySelector(".builtin-keyboard"); if (kb) kb.scrollIntoView({ behavior: "smooth", block: "nearest" }); }, 150);
      }
    }

    function render() {
      const app = document.getElementById("app");
      if (state.screen === "blitz-countdown") renderBlitzCountdown(app);
      else if (state.screen === "math-select") renderMathSelect(app);
      else if (state.screen === "home")        renderHome(app);
      else if (state.screen === "quiz")        renderQuizSelect(app);
      else if (state.screen === "gameover")    renderGameOver(app);
      else renderGame(app);
      if (state.continueModal) renderContinueModal(app);
    }

    // Auto-advance between gap inputs
    function gapInputNext(idx, total) {
      const inp = document.getElementById(`gap-${idx}`);
      if (inp && inp.value.length === 1 && idx < total - 1) {
        // Skip disabled (hinted) inputs when advancing
        let next = idx + 1;
        while (next < total) {
          const nextEl = document.getElementById(`gap-${next}`);
          if (nextEl && !nextEl.disabled) { nextEl.focus(); break; }
          next++;
        }
      }
      // Auto-submit when all non-disabled gaps are filled
      if (inp && inp.value.trim()) {
        setTimeout(() => {
          let allFilled = true;
          for (let i = 0; i < total; i++) {
            const g = document.getElementById(`gap-${i}`);
            if (!g || (!g.disabled && !g.value.trim())) { allFilled = false; break; }
          }
          if (allFilled && !state.transitioning) handleGapSubmit();
        }, 400);
      }
    }

    function gapKeyDown(e, idx, total) {
      if (e.key === "Backspace") {
        const inp = document.getElementById(`gap-${idx}`);
        if (inp && inp.value === "" && idx > 0) {
          // Skip back over disabled (hinted) inputs
          let prev = idx - 1;
          while (prev >= 0) {
            const prevEl = document.getElementById(`gap-${prev}`);
            if (prevEl && !prevEl.disabled) { prevEl.value = ""; prevEl.focus(); break; }
            prev--;
          }
        }
      }
      if (e.key === "Enter") handleGapSubmit();
    }

    // Gap keyboard helpers (custom QWERTY → gap inputs)
    function setActiveGap(event, idx) {
      event.preventDefault();
      state.activeGapIndex = idx;
      render();
    }

    function gapKbLetter(letter) {
      const inp = document.getElementById(`gap-${state.activeGapIndex}`);
      if (!inp || inp.disabled) return;
      state.gapValues[state.activeGapIndex] = letter.toUpperCase();
      // advance to next non-disabled gap
      const all = [...document.querySelectorAll(".gap-input:not([disabled])")];
      const ids = all.map(el => parseInt(el.id.replace("gap-", "")));
      const pos = ids.indexOf(state.activeGapIndex);
      if (pos !== -1 && pos < ids.length - 1) state.activeGapIndex = ids[pos + 1];
      // auto-submit if all filled
      if (ids.every(id => state.gapValues[id] && state.gapValues[id].trim())) {
        render();
        setTimeout(() => handleGapSubmit(), 150);
      } else {
        render();
      }
    }

    function gapKbBackspace() {
      if (state.gapValues[state.activeGapIndex]) {
        state.gapValues[state.activeGapIndex] = "";
        render();
        return;
      }
      // back up to previous non-disabled gap and clear it
      const all = [...document.querySelectorAll(".gap-input:not([disabled])")];
      const ids = all.map(el => parseInt(el.id.replace("gap-", "")));
      const pos = ids.indexOf(state.activeGapIndex);
      if (pos > 0) {
        state.activeGapIndex = ids[pos - 1];
        state.gapValues[state.activeGapIndex] = "";
        render();
      }
    }

    // OLO: pick a letter from the A-Z grid
    function oloPickLetter(letter) {
      if (!state.currentWord || state.transitioning) return;
      const correctIndex = state.wrongIndex;
      const correctLetter = state.currentWord.word[correctIndex].toUpperCase();
      const selectedCorrectPosition = state.selectedOloIndex === correctIndex;
      const typedCorrectLetter = letter === correctLetter;
      if (selectedCorrectPosition && typedCorrectLetter) {
        handleCorrect();
      } else {
        if (!selectedCorrectPosition) {
          state.oloPhase = "select";
          state.selectedOloIndex = -1;
          state.feedback = { type: "try", msg: "Wrong position — try again!" };
          render();
        } else {
          // Right position, wrong letter — consume an attempt
          handleMissedAttempt();
        }
      }
    }

    // Built-in keyboard helpers
    function kbPress(event, letter) {
      event.preventDefault();
      if (state.transitioning) return;
      if (state.mechanic === "lettergap") { gapKbLetter(letter); return; }
      state.wordInput += letter;
      render();
    }

    function kbBackspace(event) {
      event.preventDefault();
      if (state.transitioning) return;
      if (state.mechanic === "lettergap") { gapKbBackspace(); return; }
      state.wordInput = state.wordInput.slice(0, -1);
      render();
    }

    function kbSubmit(event) {
      event.preventDefault();
      if (state.transitioning) return;
      if (state.mechanic === "lettergap") { handleGapSubmit(); return; }
      handleSubmit();
    }

    function skipWord() {
      if (!state.blitz || !state.currentWord || state.transitioning) return;
      state.blitzTimeRemaining = Math.max(0, state.blitzTimeRemaining - 3);
      if (state.blitzTimeRemaining <= 0) { endBlitzGame(); return; }
      loadNextWord();
    }

    // Physical keyboard support for built-in keyboard mechanics
    document.addEventListener("keydown", function(e) {
      if (state.screen !== "game" || state.loading || state.transitioning) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (state.mechanic === "lettergap" && state.currentWord) {
        if (e.key === "Backspace") { e.preventDefault(); gapKbBackspace(); return; }
        if (e.key === "Enter") { e.preventDefault(); handleGapSubmit(); return; }
        if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) { e.preventDefault(); gapKbLetter(e.key); return; }
      }
      if (!["definition", "typewriter"].includes(state.mechanic)) return;
      if (e.key === "Enter") { e.preventDefault(); handleSubmit(); }
      else if (e.key === "Backspace") { e.preventDefault(); kbBackspace(e); }
      else if (e.key.length === 1) { e.preventDefault(); kbPress(e, e.key.toUpperCase()); }
    });

    initStorage();
    render();
  </script>
</body>

</html>
