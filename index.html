      const hintableCount = (state.hintLevel >= 1 && state.hintRevealed.length)
        ? (state.mechanic === "lettergap" && state.gapIndices
            ? state.gapIndices.filter((isGap, i) => isGap && state.hintRevealed[i] === null).length
            : state.hintRevealed.filter(v => v === null).length)
        : Infinity;
      const hintStillAvailable = hintableCount > 1;

      let mcButtonsHTML = "";
      if (showMC && state.multipleChoiceOptions.length > 0) {
        // For flags, look up the flag emoji for each option
        const isFlagsMode = state.selectedCategory === "flags";
        mcButtonsHTML = state.multipleChoiceOptions.map(opt => {
          let btnContent = opt.answer;
          let btnClass = "mc-btn";
          if (state.mcAnswered) {
            btnClass += opt.isCorrect ? " mc-correct" : (opt.answer === state.lastAttempt ? " mc-wrong" : "");
          }
          if (isFlagsMode) {
            btnContent = `<span class="mc-flag-label">${opt.answer}</span>`;
          }
          return `<button class="${btnClass}" onclick="handleMCAnswer('${opt.answer.replace(/'/g, "\\'")}')" ${state.mcAnswered || state.transitioning ? "disabled" : ""}>${btnContent}</button>`;
        }).join("");
      }

      const footerHTML = `
        ${showMC ? `<div class="mc-options">${mcButtonsHTML}</div>` : ""}
        ${showStandardInput ? `
          <div class="input-row">
            <input id="word-input" type="text" placeholder="Type your spelling…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" readonly ${state.transitioning ? "disabled" : ""}/>
            <button class="submit-btn" onclick="handleSubmit()" ${state.transitioning ? "disabled" : ""}>→</button>
          </div>
          ${hintAllowed && !state.transitioning && hintStillAvailable ? `<button class="hint-btn" onclick="revealNextHint()">💡 ${hintLabel}</button>` : ""}
          <div class="builtin-keyboard"${state.transitioning ? ' style="opacity:0.5;pointer-events:none"' : ""}>
            <div class="kb-row">${"QWERTYUIOP".split("").map(l => `<button class="kb-key" onpointerdown="kbPress(event,'${l}')">${l}</button>`).join("")}</div>
            <div class="kb-row">${"ASDFGHJKL".split("").map(l => `<button class="kb-key" onpointerdown="kbPress(event,'${l}')">${l}</button>`).join("")}</div>
            <div class="kb-row">
              <button class="kb-key kb-submit" onpointerdown="kbSubmit(event)">→</button>
              ${"ZXCVBNM".split("").map(l => `<button class="kb-key" onpointerdown="kbPress(event,'${l}')">${l}</button>`).join("")}
              <button class="kb-key kb-backspace" onpointerdown="kbBackspace(event)">⌫</button>
            </div>
            <div class="kb-row">
              <button class="kb-key kb-space" onpointerdown="kbPress(event,' ')">SPACE</button>
            </div>
          </div>
        ` : ""}
        ${showGapSubmit ? `
          <button class="btn-primary" onclick="handleGapSubmit()" ${state.transitioning ? "disabled" : ""}>Check Answers</button>
          ${hintAllowed && !state.transitioning && hintStillAvailable ? `<button class="hint-btn" onclick="revealNextHint()">💡 ${hintLabel}</button>` : ""}
        ` : ""}
        ${showScrambleSubmit ? `
          <button class="btn-primary" onclick="handleScrambleSubmit()" ${state.transitioning || state.scrambleSelected.length !== state.currentWord.word.length ? "disabled" : ""}>Check</button>
          ${hintAllowed && !state.transitioning && hintStillAvailable ? `<button class="hint-btn" onclick="revealNextHint()">💡 ${hintLabel}</button>` : ""}
        ` : ""}
        ${state.blitz && state.currentWord && !state.loading && !state.transitioning ? `
          <button class="skip-btn" onclick="skipWord()">Skip −3s</button>
        ` : ""}`;

      app.innerHTML = `
    <div class="game-screen">
      <div class="game-header">
        <div style="display:flex;align-items:center;gap:8px">
          <button class="home-btn" onclick="goHome()" title="Home">⌂</button>
          ${state.blitz
          ? `<span class="blitz-badge">⚡ BeeBlitz</span>`
          : `<div class="lives">${hearts}</div>`}
        </div>
        <div class="score-area">
          ${state.blitz
          ? `<span class="score-num">${state.blitzWordsCorrect}</span><span style="font-size:12px;color:var(--muted);margin-left:4px">words</span>`
          : `<span class="score-num">${state.score}</span>`}
          ${state.streak >= 2 ? `<span class="streak-pill">🔥 ${state.streak}</span>` : ""}
        </div>
      </div>
      ${state.blitz ? `
      <div class="blitz-timer-wrap">
        <div class="blitz-time-row">
          <span class="blitz-time-label">${diffLabel(state.difficulty)}</span>
          <span id="blitz-time-num" class="blitz-time-num">${Math.ceil(state.blitzTimeRemaining)}</span>
        </div>
        <div class="blitz-bar-track">
          <div id="blitz-bar-fill" class="blitz-bar-fill" style="width:${blitzTimePct}%;background:${blitzBarColor}"></div>
        </div>
      </div>` : `
      <div class="diff-bar-wrap">
        <div class="diff-bar-label">
          <span class="diff-bar-value">${diffLabel(state.difficulty)}</span>
        </div>
        <div class="diff-bar-track"><div class="diff-bar-fill" style="width:${diffPct}%"></div></div>
      </div>`}
      <div class="game-body">
        ${cardHTML}
        ${state.feedback ? `<div class="feedback ${state.feedback.type}">${state.feedback.msg}${state.lastAttempt && state.feedback.type !== 'correct' && state.mechanic !== 'oneletteroff' ? `<div style="margin-top:6px;font-size:0.88em;opacity:0.9">You typed: <span style="color:#ff8a80">"${state.lastAttempt}"</span></div>` : ''}</div>` : ""}
        ${state.hintLevel >= 1 && state.mechanic !== "lettergap" ? `
  <div class="hint-tiles">
    ${state.hintRevealed.map(ch =>
      ch ? `<span class="hint-tile revealed">${ch.toUpperCase()}</span>`
         : `<span class="hint-tile blank"></span>`
    ).join('')}
  </div>` : ""}
      </div>
      <div class="game-footer">${footerHTML}</div>
    </div>`;

      // Focus first non-hinted gap input — skip in blitz to prevent native iOS keyboard popping up
      if (state.mechanic === "lettergap" && !state.loading && !state.blitz) {
        setTimeout(() => {
          const g = document.querySelector(".gap-input:not([disabled])");
          if (g) g.focus();
        }, 100);
      }

      // Scroll built-in keyboard into view when fill-in-the-blank input is shown
      if (showStandardInput && !state.transitioning) {
        setTimeout(() => { const kb = document.querySelector(".builtin-keyboard"); if (kb) kb.scrollIntoView({ behavior: "smooth", block: "nearest" }); }, 150);
      }
    }

    // Auto-advance between gap inputs
    function gapInputNext(idx, total) {
      const inp = document.getElementById(`gap-${idx}`);
      if (inp && inp.value.length === 1 && idx < total - 1) {
        // Skip disabled (hinted) inputs when advancing
        let next = idx + 1;
        while (next < total) {
          const nextEl = document.getElementById(`gap-${next}`);
          if (nextEl && !nextEl.disabled) { nextEl.focus(); break; }
          next++;
        }
      }
      // Auto-submit when all non-disabled gaps are filled
      if (inp && inp.value.trim()) {
        setTimeout(() => {
          let allFilled = true;
          for (let i = 0; i < total; i++) {
            const g = document.getElementById(`gap-${i}`);
            if (!g || (!g.disabled && !g.value.trim())) { allFilled = false; break; }
          }
          if (allFilled && !state.transitioning) handleGapSubmit();
        }, 400);
      }
    }

    function gapKeyDown(e, idx, total) {
      if (e.key === "Backspace") {
        const inp = document.getElementById(`gap-${idx}`);
        if (inp && inp.value === "" && idx > 0) {
          // Skip back over disabled (hinted) inputs
          let prev = idx - 1;
          while (prev >= 0) {
            const prevEl = document.getElementById(`gap-${prev}`);
            if (prevEl && !prevEl.disabled) { prevEl.value = ""; prevEl.focus(); break; }
            prev--;
          }
        }
      }
      if (e.key === "Enter") handleGapSubmit();
    }

    // OLO: pick a letter from the A-Z grid
    function oloPickLetter(letter) {
      if (!state.currentWord || state.transitioning) return;
      const correctIndex = state.wrongIndex;
      const correctLetter = state.currentWord.word[correctIndex].toUpperCase();
      const selectedCorrectPosition = state.selectedOloIndex === correctIndex;
      const typedCorrectLetter = letter === correctLetter;
      if (selectedCorrectPosition && typedCorrectLetter) {
        handleCorrect();
      } else {
        if (!selectedCorrectPosition) {
          state.oloPhase = "select";
          state.selectedOloIndex = -1;
          state.feedback = { type: "try", msg: "Wrong position — try again!" };
          render();
        } else {
          // Right position, wrong letter — consume an attempt
          handleMissedAttempt();
        }
      }
    }

    // Built-in keyboard helpers (audio/definition mechanics)
    function kbPress(event, letter) {
      event.preventDefault();
      const inp = document.getElementById("word-input");
      if (!inp || state.transitioning) return;
      inp.value += letter;
    }

    function kbBackspace(event) {
      event.preventDefault();
      const inp = document.getElementById("word-input");
      if (!inp || state.transitioning) return;
      inp.value = inp.value.slice(0, -1);
    }

    function kbSubmit(event) {
      event.preventDefault();
      if (state.transitioning) return;
      handleSubmit();
    }

    function skipWord() {
      if (!state.blitz || !state.currentWord || state.transitioning) return;
      state.blitzTimeRemaining = Math.max(0, state.blitzTimeRemaining - 3);
      if (state.blitzTimeRemaining <= 0) { endBlitzGame(); return; }
      loadNextWord();
    }

    // Physical keyboard support for built-in keyboard mechanics
    document.addEventListener("keydown", function(e) {
      if (!["audio", "definition", "typewriter"].includes(state.mechanic)) return;
      if (state.screen !== "game" || state.loading || state.transitioning) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (e.key === "Enter") { e.preventDefault(); handleSubmit(); }
      else if (e.key === "Backspace") { e.preventDefault(); kbBackspace(e); }
      else if (e.key.length === 1) { e.preventDefault(); kbPress(e, e.key.toUpperCase()); }
    });

    initStorage();
    render();
  </script>
</body>

</html>
