<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#0d0d0d"/>

  <!-- Wings (left) -->
  <ellipse cx="62" cy="78" rx="28" ry="16" fill="#c8e6ff" fill-opacity="0.75" transform="rotate(-20 62 78)"/>
  <ellipse cx="62" cy="102" rx="22" ry="12" fill="#c8e6ff" fill-opacity="0.6" transform="rotate(15 62 102)"/>

  <!-- Wings (right) -->
  <ellipse cx="130" cy="78" rx="28" ry="16" fill="#c8e6ff" fill-opacity="0.75" transform="rotate(20 130 78)"/>
  <ellipse cx="130" cy="102" rx="22" ry="12" fill="#c8e6ff" fill-opacity="0.6" transform="rotate(-15 130 102)"/>

  <!-- Body -->
  <ellipse cx="96" cy="100" rx="28" ry="38" fill="#FFD100"/>

  <!-- Stripes -->
  <rect x="68" y="88" width="56" height="10" rx="5" fill="#0d0d0d"/>
  <rect x="68" y="104" width="56" height="10" rx="5" fill="#0d0d0d"/>
  <rect x="68" y="120" width="56" height="9" rx="5" fill="#0d0d0d" clip-path="url(#bodyClip)"/>

  <!-- Body clip for stripes -->
  <defs>
    <clipPath id="bodyClip">
      <ellipse cx="96" cy="100" rx="28" ry="38"/>
    </clipPath>
  </defs>

  <!-- Head -->
  <circle cx="96" cy="64" r="20" fill="#FFD100"/>

  <!-- Eyes -->
  <circle cx="89" cy="60" r="4" fill="#0d0d0d"/>
  <circle cx="103" cy="60" r="4" fill="#0d0d0d"/>
  <circle cx="90" cy="59" r="1.5" fill="white"/>
  <circle cx="104" cy="59" r="1.5" fill="white"/>

  <!-- Smile -->
  <path d="M 88 70 Q 96 76 104 70" stroke="#0d0d0d" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Antennae -->
  <line x1="89" y1="45" x2="78" y2="30" stroke="#0d0d0d" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="77" cy="28" r="4" fill="#FFD100" stroke="#0d0d0d" stroke-width="2"/>
  <line x1="103" y1="45" x2="114" y2="30" stroke="#0d0d0d" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="115" cy="28" r="4" fill="#FFD100" stroke="#0d0d0d" stroke-width="2"/>

  <!-- Stinger -->
  <polygon points="96,136 91,148 101,148" fill="#0d0d0d" clip-path="url(#bodyClip)"/>
</svg>
